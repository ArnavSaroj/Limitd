events {}

http {
    upstream rate_limiter {
        server rate-limiter:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://rate_limiter;

            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
        }
    }
}